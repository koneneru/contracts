syntax = "proto3";

package auth;
option go_package = "github.com/koneneru/auth/pkg/auth/go;auth";

import "google/protobuf/empty.proto";
import "auth_model.proto";

service Auth {
    rpc Register(RegisterRequest) returns (google.protobuf.Empty);
    rpc Login(LoginRequest) returns (TokenPair);
    rpc Refresh(RefreshRequest) returns (TokenPair);
    rpc Validate(ValidateRequest) returns (ValidateResponse);
    rpc Logout(RefreshRequest) returns (google.protobuf.Empty);
}

message RegisterRequest {
    string login = 1;
    string email = 2;
    string password = 3;
}

message LoginRequest {
    string login_or_email = 1;
    string password = 2;
}

message RefreshRequest {
    string refresh_token = 1;
}

message ValidateRequest {
    string access_token = 1;
}

message ValidateResponse {
    uint64 user_id = 1;
}
